<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusCoin— Blockchain University Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.1.16/umd/Recharts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.0/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --surface:#111111;
  --surface2:#161616;
  --surface3:#1a1a1a;
  --border:rgba(255,255,255,0.07);
  --border-h:rgba(255,255,255,0.13);
  --text:#ededee;
  --muted:#777;
  --muted2:#333;
  --accent:#014221;
  --accent-h:#016b35;
  --accent-t:#4ade80;
  --accent-d:rgba(1,66,33,0.16);
  --accent-b:rgba(1,66,33,0.28);
  --red:#f87171;
  --amber:#fbbf24;
  --blue:#60a5fa;
  --purple:#a78bfa;
  --token:#f59e0b;
  --token-d:rgba(245,158,11,0.12);
  --token-b:rgba(245,158,11,0.25);
}
html,body,#root{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Geist',-apple-system,sans-serif;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
input,textarea,select,button{font-family:inherit;font-size:inherit}
button{cursor:pointer}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:4px}

/* ── AUTH ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--bg)}
.auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem}
.auth-logo{display:flex;align-items:center;gap:9px;font-family:'Instrument Serif',serif;font-size:1.3rem;margin-bottom:2rem}
.auth-logo-mark{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.auth-logo-mark svg{width:15px;height:15px}
.auth-badge{font-size:0.6rem;background:var(--token-d);color:var(--token);border:1px solid var(--token-b);border-radius:4px;padding:2px 8px;font-weight:700;letter-spacing:.07em;margin-left:4px;vertical-align:middle}
.auth-title{font-size:1.05rem;font-weight:600;margin-bottom:.3rem}
.auth-sub{font-size:.82rem;color:var(--muted);margin-bottom:1.75rem}
.auth-role-pick{display:flex;gap:.5rem;margin-bottom:1.5rem}
.role-btn{flex:1;padding:.55rem;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:.8rem;font-weight:500;transition:all .15s}
.role-btn.active{border-color:var(--accent-b);background:var(--accent-d);color:var(--accent-t)}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:.4rem;font-weight:500}
.field input,.field select{width:100%;padding:.62rem .9rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--accent-t)}
.field select option{background:var(--surface2)}
.btn-full{width:100%;padding:.72rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:600;font-size:.88rem;transition:background .15s;margin-top:.4rem}
.btn-full:hover{background:var(--accent-h)}
.btn-full:disabled{opacity:.5;cursor:not-allowed}
.auth-switch{font-size:.78rem;color:var(--muted);text-align:center;margin-top:1.2rem}
.auth-switch button{background:none;border:none;color:var(--accent-t);font-weight:500;padding:0}
.auth-err{font-size:.78rem;color:var(--red);margin-bottom:.75rem;padding:.55rem .8rem;background:rgba(248,113,113,.07);border-radius:6px;border:1px solid rgba(248,113,113,.18)}

/* ── APP SHELL ── */
.app-shell{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:228px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-top{padding:1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sidebar-logo{font-family:'Instrument Serif',serif;font-size:1rem;display:flex;align-items:center;gap:7px}
.sidebar-logo-mark{width:24px;height:24px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center}
.sidebar-logo-mark svg{width:12px;height:12px}
.sidebar-nav{flex:1;padding:.65rem .45rem}
.nav-section-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted2);padding:.7rem .65rem .25rem}
.nav-item{display:flex;align-items:center;gap:8px;padding:.52rem .65rem;border-radius:7px;color:var(--muted);font-size:.82rem;font-weight:400;cursor:pointer;transition:all .15s;border:1px solid transparent;background:none;width:100%;text-align:left;margin-bottom:1px}
.nav-item svg{width:13px;height:13px;flex-shrink:0}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--text);background:var(--surface2);border-color:var(--border)}
.nav-item.active svg{color:var(--accent-t)}
.sidebar-bottom{padding:.75rem;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:8px;padding:.4rem .5rem}
.user-av{width:30px;height:30px;border-radius:8px;background:var(--accent-d);border:1px solid var(--accent-b);display:flex;align-items:center;justify-content:center;font-size:.68rem;color:var(--accent-t);font-weight:700;flex-shrink:0}
.user-name{font-size:.8rem;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-role-tag{font-size:.6rem;color:var(--muted);background:var(--surface2);border-radius:4px;padding:1px 6px;border:1px solid var(--border)}
.btn-logout{background:none;border:none;color:var(--muted);font-size:.72rem;padding:.2rem;transition:color .15s;margin-top:.25rem;text-align:left}
.btn-logout:hover{color:var(--red)}

/* ── TOKEN BALANCE BAR ── */
.token-bar{margin:.75rem .45rem .2rem;background:var(--token-d);border:1px solid var(--token-b);border-radius:10px;padding:.65rem .85rem;display:flex;align-items:center;gap:.6rem}
.token-icon{font-size:1rem}
.token-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.token-val{font-size:1.05rem;font-weight:700;color:var(--token);font-family:'Instrument Serif',serif}

/* ── MAIN ── */
.main-content{flex:1;overflow-y:auto;background:var(--bg)}
.page{padding:2rem;max-width:1020px}
.page-header{margin-bottom:1.75rem}
.page-title{font-family:'Instrument Serif',serif;font-size:1.75rem;font-weight:400;letter-spacing:-.4px;margin-bottom:.2rem}
.page-sub{font-size:.83rem;color:var(--muted)}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:.9rem;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.15rem}
.stat-label{font-size:.68rem;color:var(--muted);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-size:1.45rem;font-weight:600;letter-spacing:-.4px}
.stat-sub{font-size:.68rem;margin-top:3px}
.green-t{color:var(--accent-t)}
.red-t{color:var(--red)}
.amber-t{color:var(--amber)}
.blue-t{color:var(--blue)}
.purple-t{color:var(--purple)}
.token-t{color:var(--token)}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.15rem;margin-bottom:.9rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.card-title{font-size:.83rem;font-weight:600}
.card-action{font-size:.72rem;color:var(--accent-t);background:none;border:none;padding:0;transition:opacity .15s}
.card-action:hover{opacity:.7}

/* ── BLOCKCHAIN TX ROW ── */
.tx-row{display:flex;align-items:center;gap:.75rem;padding:.7rem 0;border-bottom:1px solid var(--border)}
.tx-row:last-child{border-bottom:none;padding-bottom:0}
.tx-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.tx-icon.send{background:rgba(248,113,113,.1)}
.tx-icon.recv{background:rgba(74,222,128,.1)}
.tx-icon.fee{background:rgba(96,165,250,.1)}
.tx-icon.event{background:rgba(167,139,250,.1)}
.tx-icon.contract{background:rgba(245,158,11,.1)}
.tx-info{flex:1}
.tx-name{font-size:.84rem;font-weight:500}
.tx-meta{font-size:.69rem;color:var(--muted);margin-top:1px;font-family:monospace}
.tx-hash{font-size:.62rem;color:var(--muted2);font-family:monospace}
.tx-amount{text-align:right}
.tx-token{font-size:.88rem;font-weight:700}
.tx-token.positive{color:var(--accent-t)}
.tx-token.negative{color:var(--red)}
.tx-time{font-size:.65rem;color:var(--muted);margin-top:1px}

/* ── BLOCK BADGE ── */
.block-badge{display:inline-flex;align-items:center;gap:4px;font-size:.58rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-family:monospace}
.block-dot{width:5px;height:5px;border-radius:50%;background:var(--accent-t);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── TRANSFER FORM ── */
.transfer-card{background:linear-gradient(135deg,rgba(1,66,33,.1),rgba(1,66,33,.04));border:1px solid var(--accent-b);border-radius:14px;padding:1.5rem;margin-bottom:1rem}
.transfer-title{font-size:.9rem;font-weight:600;margin-bottom:.2rem}
.transfer-sub{font-size:.78rem;color:var(--muted);margin-bottom:1.25rem}
.transfer-fields{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.9rem}
.transfer-fields.three{grid-template-columns:1fr 1fr 1fr}
.tf-label{font-size:.72rem;color:var(--muted);margin-bottom:.35rem;font-weight:500;display:block}
.tf-input{width:100%;padding:.58rem .8rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);outline:none;transition:border-color .15s}
.tf-input:focus{border-color:var(--accent-t)}
.tf-input.token-input{border-color:var(--token-b);background:var(--token-d)}
.btn-transfer{padding:.65rem 1.5rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:600;font-size:.85rem;transition:background .15s}
.btn-transfer:hover{background:var(--accent-h)}
.btn-transfer:disabled{opacity:.5;cursor:not-allowed}

/* ── SMART CONTRACT CARD ── */
.contract-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin-bottom:.75rem}
.contract-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.75rem}
.contract-name{font-size:.88rem;font-weight:600}
.contract-type{font-size:.62rem;background:var(--token-d);color:var(--token);border:1px solid var(--token-b);border-radius:4px;padding:2px 8px;font-weight:700;letter-spacing:.05em}
.contract-desc{font-size:.78rem;color:var(--muted);line-height:1.65;margin-bottom:.9rem}
.contract-params{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.9rem}
.param-chip{font-size:.68rem;padding:.28rem .7rem;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:monospace}
.contract-trigger{font-size:.72rem;color:var(--accent-t);padding:.4rem .9rem;border:1px solid var(--accent-b);background:var(--accent-d);border-radius:6px;transition:all .15s;font-weight:500}
.contract-trigger:hover{background:var(--accent-b)}
.contract-status{display:flex;align-items:center;gap:.4rem;font-size:.68rem;color:var(--muted)}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-dot.active{background:var(--accent-t)}
.status-dot.pending{background:var(--amber)}

/* ── USER MANAGEMENT TABLE ── */
.user-table{width:100%;border-collapse:collapse}
.user-table th{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:.5rem .75rem;text-align:left;border-bottom:1px solid var(--border);font-weight:500}
.user-table td{padding:.65rem .75rem;font-size:.82rem;border-bottom:1px solid var(--border)}
.user-table tr:last-child td{border-bottom:none}
.user-table tr:hover td{background:rgba(255,255,255,.02)}
.role-tag{font-size:.62rem;font-weight:600;padding:2px 8px;border-radius:4px}
.role-student{background:rgba(96,165,250,.1);color:var(--blue)}
.role-admin{background:rgba(245,158,11,.1);color:var(--token)}
.status-tag{font-size:.62rem;font-weight:600;padding:2px 8px;border-radius:4px}
.status-active{background:rgba(74,222,128,.1);color:var(--accent-t)}
.status-suspended{background:rgba(248,113,113,.1);color:var(--red)}
.btn-sm{padding:.38rem .85rem;border-radius:6px;background:var(--accent);color:#fff;border:none;font-size:.75rem;font-weight:500;transition:background .15s}
.btn-sm:hover{background:var(--accent-h)}
.btn-sm:disabled{opacity:.5;cursor:not-allowed}
.btn-danger-sm{padding:.38rem .85rem;border-radius:6px;background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2);font-size:.75rem;font-weight:500;transition:all .15s}
.btn-danger-sm:hover{background:rgba(248,113,113,.2)}

/* ── EVENT CARD ── */
.event-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin-bottom:.75rem;display:flex;align-items:flex-start;gap:1rem}
.event-icon-box{width:42px;height:42px;border-radius:10px;background:var(--accent-d);border:1px solid var(--accent-b);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.event-info{flex:1}
.event-name{font-size:.88rem;font-weight:600;margin-bottom:.15rem}
.event-org{font-size:.72rem;color:var(--muted);margin-bottom:.4rem}
.event-meta{display:flex;flex-wrap:wrap;gap:.5rem}
.event-chip{font-size:.65rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 8px}
.event-chip.token{color:var(--token);background:var(--token-d);border-color:var(--token-b)}
.event-action{display:flex;flex-direction:column;align-items:flex-end;gap:.5rem}
.event-price{font-size:1rem;font-weight:700;color:var(--token)}
.event-price-sub{font-size:.65rem;color:var(--muted)}

/* ── CHART ── */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:.9rem}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.15rem}
.chart-title{font-size:.75rem;font-weight:600;margin-bottom:.9rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;padding:1.5rem}
.modal-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:400px}
.modal-title{font-size:.95rem;font-weight:600;margin-bottom:.3rem}
.modal-sub{font-size:.78rem;color:var(--muted);margin-bottom:1.2rem}
.modal-actions{display:flex;gap:.5rem;margin-top:1rem}
.btn-ghost{flex:1;padding:.6rem;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:.82rem;font-weight:500;transition:all .15s}
.btn-ghost:hover{border-color:var(--border-h);color:var(--text)}
.btn-save{flex:1;padding:.6rem;border-radius:8px;background:var(--accent);border:none;color:#fff;font-size:.82rem;font-weight:600;transition:background .15s}
.btn-save:hover{background:var(--accent-h)}

/* ── LEDGER ── */
.ledger-hash{font-family:monospace;font-size:.65rem;color:var(--muted2);margin-top:2px}
.ledger-chain{display:flex;gap:0;margin-bottom:1rem;overflow-x:auto;padding-bottom:.5rem}
.chain-block{flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.5rem .8rem;font-size:.65rem;font-family:monospace;position:relative}
.chain-block+.chain-block::before{content:'→';position:absolute;left:-10px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:.7rem}
.chain-block.latest{border-color:var(--accent-b);background:var(--accent-d)}
.block-num{color:var(--accent-t);font-weight:700;margin-bottom:2px}
.block-txs{color:var(--muted)}

/* ── ADD FORM ── */
.add-form{display:flex;flex-wrap:wrap;gap:.55rem;padding:.9rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:.9rem}
.add-form input,.add-form select{flex:1;min-width:110px;padding:.52rem .72rem;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);outline:none;transition:border-color .15s}
.add-form input:focus,.add-form select:focus{border-color:var(--accent-t)}
.add-form select option{background:var(--surface2)}

/* ── MISC ── */
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:.83rem}
.empty-icon{font-size:1.75rem;margin-bottom:.5rem;opacity:.35}
.divider{border:none;border-top:1px solid var(--border);margin:.9rem 0}
.row{display:flex;gap:.9rem}
.row>*{flex:1}
.notice{font-size:.75rem;color:var(--muted);padding:.6rem .9rem;background:var(--surface2);border:1px solid var(--border);border-radius:7px;margin-bottom:.9rem}
.notice.success{color:var(--accent-t);background:var(--accent-d);border-color:var(--accent-b)}
.notice.warn{color:var(--amber);background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2)}

/* ── QR PAYMENT ── */
.qr-mode-bar{display:flex;gap:.5rem;margin-bottom:1.1rem}
.qr-mode-btn{flex:1;padding:.55rem .75rem;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:.8rem;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:.4rem}
.qr-mode-btn.active{border-color:var(--accent-b);background:var(--accent-d);color:var(--accent-t)}
.qr-display-wrap{background:var(--surface2);border:1px solid var(--accent-b);border-radius:14px;padding:1.75rem;display:flex;flex-direction:column;align-items:center;gap:1rem}
.qr-white-box{background:#fff;border-radius:14px;padding:14px;display:inline-flex;box-shadow:0 0 0 1px rgba(255,255,255,.06)}
.qr-uid-mono{font-size:.62rem;color:var(--muted);font-family:monospace;text-align:center;letter-spacing:.04em}
.qr-scan-area{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1rem;min-height:200px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.75rem}
.qr-scan-area video{border-radius:8px;max-width:100%}
.btn-scan-start{padding:.62rem 1.5rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:600;font-size:.85rem;cursor:pointer;display:flex;align-items:center;gap:.5rem}
.btn-scan-start:hover{background:var(--accent-h)}
.btn-scan-stop{padding:.62rem 1.5rem;background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.25);border-radius:8px;font-size:.85rem;cursor:pointer;font-weight:500}
.pay-recipient-box{display:flex;align-items:center;gap:.75rem;padding:.75rem;background:var(--surface);border:1px solid var(--accent-b);border-radius:10px;margin-bottom:1rem;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.pay-av{width:38px;height:38px;border-radius:9px;background:var(--accent-d);border:1px solid var(--accent-b);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:var(--accent-t);flex-shrink:0}
.pay-rname{font-size:.88rem;font-weight:600;color:var(--text)}
.pay-rid{font-size:.68rem;color:var(--muted);font-family:monospace}

// ── QR SCANNER COMPONENT ─────────────────────────────
function QRScanner({ onScanned }) {
  const [scanning, setScanning] = useState(false);
  const [err, setErr]           = useState("");
  const html5Ref    = useRef(null);
  const stableId    = useRef("qr-" + Math.random().toString(36).slice(2, 9));
  const readerDivRef = useRef(null);

  useEffect(() => {
    if (!scanning) return;
    let cancelled = false;
    requestAnimationFrame(() => {
      if (cancelled) return;
      const el = readerDivRef.current;
      if (!el) { setErr("Camera container failed to mount. Try again."); setScanning(false); return; }
      el.id = stableId.current;
      try {
        const scanner = new Html5Qrcode(stableId.current);
        html5Ref.current = scanner;
        scanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 220, height: 220 } },
          (decoded) => {
            try {
              const data = JSON.parse(decoded);
              scanner.stop().catch(() => {});
              html5Ref.current = null;
              setScanning(false);
              onScanned(data);
            } catch(e) { setErr("Invalid QR — not a CampusCoin code"); }
          },
          () => {}
        ).catch(e => { if (!cancelled) { setErr("Camera error: " + String(e)); setScanning(false); } });
      } catch(e) { if (!cancelled) { setErr("Scanner init failed: " + String(e)); setScanning(false); } }
    });
    return () => {
      cancelled = true;
      if (html5Ref.current) { html5Ref.current.stop().catch(() => {}); html5Ref.current = null; }
    };
  }, [scanning]);

  function stopScan() {
    if (html5Ref.current) { html5Ref.current.stop().catch(() => {}); html5Ref.current = null; }
    setScanning(false);
  }

  return (
    <div>
      {!scanning && (
        <div className="qr-scan-area" style={{minHeight:160}}>
          <div style={{fontSize:"2rem",opacity:.35}}>📷</div>
          <div style={{fontSize:".82rem",color:"var(--muted)",textAlign:"center"}}>Point camera at recipient's QR code</div>
          <button className="btn-scan-start" onClick={()=>{ setErr(""); setScanning(true); }}>
            <span>📸</span> Start Camera Scan
          </button>
          {err && <div style={{fontSize:".72rem",color:"var(--red)",marginTop:".5rem"}}>{err}</div>}
        </div>
      )}
      <div style={{display: scanning ? "flex" : "none", flexDirection:"column", alignItems:"center", gap:".75rem"}} className="qr-scan-area">
        <div ref={readerDivRef} style={{width:"100%",maxWidth:320}} />
        <button className="btn-scan-stop" onClick={stopScan}>✕ Stop Scanning</button>
        {err && <div style={{fontSize:".72rem",color:"var(--red)"}}>{err}</div>}
      </div>
    </div>
  );
}

  const [scannedRecipient, setScannedRecipient] = useState(null); // {uid, name}
  const [qrAmount, setQrAmount] = useState("");
  const [qrNote,   setQrNote]   = useState("");
  const [qrPurpose,setQrPurpose]= useState("Canteen");
  const [qrBusy,   setQrBusy]   = useState(false);
  const [qrSuccess, setQrSuccess] = useState(null); // {amt, name, hash, block}

  const purposes = ["Canteen","Fee Payment","Bookstore","Library Fine","Event Registration","Scholarship","Peer Transfer","Services","Other"];

  // ── Shared atomic transfer ──
  async function executeTransfer({ senderUid, recipientUid, recipientName, amt, purposeLabel, noteStr }) {
    const hash  = genHash();
    const block = genBlockNum();
    const senderRef    = db.collection("users").doc(senderUid);
    const recipientRef = db.collection("users").doc(recipientUid);

    await db.runTransaction(async (txn) => {
      const sSnap = await txn.get(senderRef);
      const rSnap = await txn.get(recipientRef);
      const sBal  = sSnap.data().tokenBalance || 0;
      if (sBal < amt) throw new Error("Insufficient balance");
      txn.update(senderRef,    { tokenBalance: sBal - amt, totalSpent: (sSnap.data().totalSpent||0)+amt });
      txn.update(recipientRef, { tokenBalance: (rSnap.data().tokenBalance||0)+amt, totalReceived:(rSnap.data().totalReceived||0)+amt });
    });

    const senderTx    = { uid:senderUid,    type:"send", label:purposeLabel, amount:amt, counterparty:recipientName,       hash, block, note:noteStr, ts:firebase.firestore.FieldValue.serverTimestamp() };
    const recipientTx = { uid:recipientUid, type:"recv", label:purposeLabel, amount:amt, counterparty:profile.name||"User", hash, block, note:noteStr, ts:firebase.firestore.FieldValue.serverTimestamp() };
    const ref = await db.collection("transactions").add(senderTx);
    await db.collection("transactions").add(recipientTx);

    setTransactions(prev => [{ id:ref.id, ...senderTx, ts:new Date() }, ...prev]);
    setProfile(p => ({ ...p, tokenBalance:(p.tokenBalance||0)-amt, totalSpent:(p.totalSpent||0)+amt }));
    return { hash, block };
  }

  // ── QR Pay ──
  async function handleQrPay() {
    const amt = Number(qrAmount);
    if (!amt || amt <= 0) return;
    if (amt > (profile.tokenBalance||0)) { alert("Insufficient balance"); return; }
    if (!scannedRecipient) return;
    if (scannedRecipient.uid === user.uid) { alert("Cannot pay yourself"); return; }
    setQrBusy(true);
    try {
      const { hash, block } = await executeTransfer({
        senderUid: user.uid, recipientUid: scannedRecipient.uid,
        recipientName: scannedRecipient.name, amt,
        purposeLabel: qrPurpose, noteStr: qrNote || ""
      });
      setQrSuccess({ amt, name: scannedRecipient.name, hash, block });
    } catch(e) { alert("Payment failed: " + e.message); }
    setQrBusy(false);
  }

  // ── Manual send (fee/p2p) ──
  async function sendTokens() {
    const amt = Number(amount);
    if (!amt || amt <= 0) return setMsg("Enter a valid amount");
    if (amt > (profile.tokenBalance||0)) return setMsg("Insufficient token balance");
    if (!toId.trim()) return setMsg("Enter recipient email or Student ID");
    setBusy(true); setMsg("");
    try {
      let recipientDoc = null;
      const emailSnap = await db.collection("users").where("email","==",toId.trim().toLowerCase()).get();
      if (!emailSnap.empty) recipientDoc = emailSnap.docs[0];
      else {
        const sidSnap = await db.collection("users").where("studentId","==",toId.trim()).get();
        if (!sidSnap.empty) recipientDoc = sidSnap.docs[0];
      }
      if (!recipientDoc) { setMsg("❌ Recipient not found."); setBusy(false); return; }
      if (recipientDoc.id === user.uid) { setMsg("❌ Cannot send to yourself."); setBusy(false); return; }
      const recipientName = recipientDoc.data().name || toId;
      const { block } = await executeTransfer({ senderUid:user.uid, recipientUid:recipientDoc.id, recipientName, amt, purposeLabel:purpose, noteStr:note||"" });
      setMsg(`✓ ${amt} ${CAMPUS_TOKEN} sent to ${recipientName}! Block #${block} recorded.`);
    } catch(e) {
      if (e.message?.toLowerCase().includes("missing or insufficient permissions"))
        setMsg("❌ Firestore rules blocking transfer. Check the rules banner.");
      else setMsg("❌ Transfer failed: " + e.message);
    }
    setToId(""); setAmount(""); setNote(""); setBusy(false);
  }


  const tabs = [
    { id:"qr-pay",  label:"📸 Scan & Pay" },
    { id:"my-qr",   label:"📱 My QR" },
    { id:"p2p",     label:"Peer Transfer" },
    { id:"history", label:"History" },
  ];

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">My Wallet</div>
        <div className="page-sub">Secure on-chain transactions · {(profile.tokenBalance||0).toLocaleString()} {CAMPUS_TOKEN} available</div>
      </div>

      {/* Balance card */}
      <div className="transfer-card" style={{marginBottom:"1.25rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:".72rem",color:"var(--muted)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:"4px"}}>Token Balance</div>
            <div style={{fontSize:"2.2rem",fontWeight:"700",color:"var(--token)",fontFamily:"'Instrument Serif',serif",letterSpacing:"-1px"}}>
              {(profile.tokenBalance||0).toLocaleString()}
            </div>
            <div style={{fontSize:".75rem",color:"var(--muted)",marginTop:"2px"}}>{CAMPUS_TOKEN} · {TOKEN_NAME}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:".72rem",color:"var(--muted)"}}>Wallet ID</div>
            <div style={{fontSize:".68rem",fontFamily:"monospace",color:"var(--muted2)",marginTop:"2px"}}>{user.uid.slice(0,16)}…</div>
            <div style={{fontSize:".68rem",color:"var(--muted)",marginTop:"4px"}}>{profile.role} · {profile.studentId||""}</div>
          </div>
        </div>
      </div>

      {/* Tab bar */}
      <div style={{display:"flex",gap:".4rem",marginBottom:"1rem",flexWrap:"wrap"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);setMsg("");setScannedRecipient(null);setQrSuccess(null);}}
            style={{padding:".42rem .85rem",borderRadius:"7px",border:"1px solid",fontSize:".78rem",fontWeight:500,transition:"all .15s",
              borderColor:tab===t.id?"var(--accent-b)":"var(--border)",
              background:tab===t.id?"var(--accent-d)":"transparent",
              color:tab===t.id?"var(--accent-t)":"var(--muted)"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ── QR PAY TAB ── */}
      {tab==="qr-pay" && (
        <div>
          {qrSuccess ? (
            /* SUCCESS SCREEN */
            <div className="success-screen">
              <div className="success-ring">✓</div>
              <div className="success-amt">{qrSuccess.amt} {CAMPUS_TOKEN}</div>
              <div className="success-sub">Sent to {qrSuccess.name}</div>
              <div className="success-hash">{qrSuccess.hash} · Block #{qrSuccess.block}</div>
              <button className="btn-transfer" style={{marginTop:"1.5rem"}} onClick={()=>{setQrSuccess(null);setScannedRecipient(null);setQrAmount("");setQrNote("");}}>
                Pay Again →
              </button>
            </div>
          ) : !scannedRecipient ? (
            /* SCANNER */
            <div className="card">
              <div className="card-header">
                <div className="card-title">Scan Recipient QR Code</div>
                <span style={{fontSize:".68rem",color:"var(--muted)"}}>Uses your camera</span>
              </div>
              <QRScanner onScanned={(data) => {
                if (data.uid && data.name) setScannedRecipient(data);
                else alert("Invalid CampusCoin QR code");
              }} />
              <div style={{marginTop:".75rem",fontSize:".72rem",color:"var(--muted)",textAlign:"center"}}>
                Or ask the recipient to show their QR from the "My QR" tab
              </div>
            </div>
          ) : (
            /* PAYMENT FORM after scan */
            <div className="qr-pay-form">
              <div className="transfer-title">Confirm Payment</div>
              <div className="transfer-sub" style={{marginBottom:"1rem"}}>Review and enter amount before sending</div>

              {/* Recipient chip */}
              <div className="pay-recipient-box">
                <div className="pay-av">{scannedRecipient.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase()}</div>
                <div>
                  <div className="pay-rname">{scannedRecipient.name}</div>
                  <div className="pay-rid">{scannedRecipient.uid.slice(0,20)}…</div>
                </div>
                <button style={{marginLeft:"auto",background:"none",border:"none",color:"var(--muted)",fontSize:.9+"rem",cursor:"pointer"}} onClick={()=>setScannedRecipient(null)}>✕</button>
              </div>

              <div className="transfer-fields">
                <div>
                  <label className="tf-label">Purpose</label>
                  <select className="tf-input" value={qrPurpose} onChange={e=>setQrPurpose(e.target.value)}>
                    {purposes.map(p=><option key={p}>{p}</option>)}
                  </select>
                </div>
                <div>
                  <label className="tf-label">Amount ({CAMPUS_TOKEN})</label>
                  <input className="tf-input token-input" type="number" min="1" value={qrAmount} onChange={e=>setQrAmount(e.target.value)} placeholder="0" />
                </div>
              </div>
              <div style={{marginBottom:".9rem"}}>
                <label className="tf-label">Note (optional)</label>
                <input className="tf-input" value={qrNote} onChange={e=>setQrNote(e.target.value)} placeholder="e.g. Lunch at canteen" style={{width:"100%"}} />
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{fontSize:".72rem",color:"var(--muted)"}}>Gas fee: 0 {CAMPUS_TOKEN} · Blockchain secured</div>
                <button className="btn-transfer" onClick={handleQrPay} disabled={qrBusy||!qrAmount||Number(qrAmount)<=0}>
                  {qrBusy?"Broadcasting…":`Send ${qrAmount||"0"} ${CAMPUS_TOKEN} →`}
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── MY QR TAB ── */}
      {tab==="my-qr" && (
        <div className="card">
          <div className="card-header"><div className="card-title">Your Payment QR Code</div></div>
          <QRDisplay userId={user.uid} userName={profile.name||"User"} />
          <div style={{marginTop:"1rem",fontSize:".75rem",color:"var(--muted)",textAlign:"center"}}>
            Share this with anyone who wants to pay you. They scan it from the "Scan & Pay" tab.
          </div>
        </div>
      )}



      {msg && <div className={`notice ${msg.startsWith("✓")?"success":"warn"}`}>{msg}</div>}

      {/* ── SEND / P2P TABS ── */}
      {tab==="p2p" && (
        <div className="transfer-card">
          <div className="transfer-title">"Peer-to-Peer Transfer"</div>
          <div className="transfer-sub">
            "Send tokens directly to another student by email or Student ID."
          </div>
          <div className="transfer-fields three">
            <div>
              <label className="tf-label">"Recipient Email or Student ID"</label>
              <input className="tf-input" value={toId} onChange={e=>setToId(e.target.value)} placeholder="2023CS042 or @student" />
            </div>
            <div>
              <label className="tf-label">Purpose</label>
              <select className="tf-input" value={purpose} onChange={e=>setPurpose(e.target.value)}>
                {purposes.map(p=><option key={p}>{p}</option>)}
              </select>
            </div>
            <div>
              <label className="tf-label">Amount ({CAMPUS_TOKEN})</label>
              <input className="tf-input token-input" type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0" />
            </div>
          </div>
          <div style={{marginBottom:".9rem"}}>
            <label className="tf-label">Note (optional)</label>
            <input className="tf-input" value={note} onChange={e=>setNote(e.target.value)} placeholder="e.g. Semester 4 tuition fee" style={{width:"100%"}} />
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontSize:".72rem",color:"var(--muted)"}}>Gas fee: 0 {CAMPUS_TOKEN} · Smart contract secured</div>
            <button className="btn-transfer" onClick={()=>sendTokens()} disabled={busy||!amount||!toId}>
              {busy?"Broadcasting…":"Send " + (amount||"0") + " " + CAMPUS_TOKEN + " →"}
            </button>
          </div>
        </div>
      )}

      {/* ── HISTORY TAB ── */}
      {tab==="history" && (
        <div className="card">
          <div className="card-header"><div className="card-title">Transaction Ledger</div></div>
          {transactions.length === 0
            ? <div className="empty-state"><div className="empty-icon">📒</div>No transactions yet</div>
            : transactions.map(tx => <TxRow key={tx.id} tx={tx} />)
          }
        </div>
      )}
    </div>
  );
}

// ── EVENTS ───────────────────────────────────────────
function EventsPage({ user, profile, setProfile, transactions, setTransactions }) {
  const [msg, setMsg] = useState({});
  const [busy, setBusy] = useState({});

  async function registerEvent(ev) {
    if ((profile.tokenBalance||0) < ev.price) return setMsg({[ev.id]:"Insufficient tokens"});
    setBusy({[ev.id]:true});
    const newBal = (profile.tokenBalance||0) - ev.price;
    await db.collection("users").doc(user.uid).update({ tokenBalance: newBal });
    const txDoc = {
      uid: user.uid, type:"event", label:`Event: ${ev.name}`,
      amount: ev.price, counterparty: ev.org,
      hash: genHash(), block: genBlockNum(),
      note: `Smart contract escrow · ticket secured`,
      ts: firebase.firestore.FieldValue.serverTimestamp()
    };
    const ref = await db.collection("transactions").add(txDoc);
    setTransactions(prev=>[{id:ref.id,...txDoc,ts:new Date()},...prev]);
    setProfile(p=>({...p,tokenBalance:newBal}));
    setMsg({[ev.id]:`✓ Registered! Ticket on-chain.`});
    setBusy({});
  }

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">Campus Events</div>
        <div className="page-sub">Register and pay with {CAMPUS_TOKEN} — tickets secured by smart contract escrow</div>
      </div>

      <div className="notice">🔒 Event payments use the <strong>Event Ticket Escrow</strong> smart contract. Tokens are held securely and refunded automatically if an event is cancelled.</div>

      {CAMPUS_EVENTS.map(ev => (
        <div key={ev.id} className="event-card">
          <div className="event-icon-box">{ev.icon}</div>
          <div className="event-info">
            <div className="event-name">{ev.name}</div>
            <div className="event-org">{ev.org}</div>
            <div className="event-meta">
              <span className="event-chip">📅 {ev.date}</span>
              <span className="event-chip">{ev.category}</span>
              <span className="event-chip">{ev.registered}/{ev.spots} registered</span>
              <span className="event-chip token">{ev.price===0?"FREE":ev.price+" "+CAMPUS_TOKEN}</span>
            </div>
            {msg[ev.id] && <div style={{marginTop:".5rem",fontSize:".72rem",color:msg[ev.id].startsWith("✓")?"var(--accent-t)":"var(--red)"}}>{msg[ev.id]}</div>}
          </div>
          <div className="event-action">
            <div>
              <div className="event-price">{ev.price===0?"FREE":ev.price+" "+CAMPUS_TOKEN}</div>
              <div className="event-price-sub">{ev.price>0?"via escrow contract":"open entry"}</div>
            </div>
            <button className="btn-sm" onClick={()=>registerEvent(ev)} disabled={!!busy[ev.id]||ev.registered>=ev.spots}>
              {busy[ev.id]?"…":ev.registered>=ev.spots?"Full":"Register →"}
            </button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── SMART CONTRACTS ──────────────────────────────────
function ContractsPage({ user, profile, transactions, setTransactions, setProfile }) {
  const [executing, setExecuting] = useState({});
  const [results, setResults]     = useState({});

  async function executeContract(contract) {
    setExecuting(e=>({...e,[contract.id]:true}));

    let amount = 0, label = "", type = "contract";
    if (contract.id==="scholarship") { amount=200; label="Scholarship Disbursement"; type="recv"; }
    else if (contract.id==="fee-auto") { amount=150; label="Auto Fee Deduction"; type="fee"; }

    if (amount > 0) {
      try {
        // Get ALL students
        const studentsSnap = await db.collection("users").where("role","==","student").get();
        const students = studentsSnap.docs.map(d=>({id:d.id,...d.data()}));
        const hash = genHash();
        const block = genBlockNum();

        // Apply contract to each student
        for (const student of students) {
          const newBal = type==="recv"
            ? (student.tokenBalance||0) + amount
            : Math.max(0,(student.tokenBalance||0) - amount);

          // Update student wallet
          await db.collection("users").doc(student.id).update({ tokenBalance: newBal });

          // Write transaction record for student
          await db.collection("transactions").add({
            uid: student.id,
            type,
            label,
            amount,
            counterparty: `Smart Contract · ${contract.name}`,
            hash,
            block,
            note: `Enforced by Admin · ${contract.name}`,
            ts: firebase.firestore.FieldValue.serverTimestamp()
          });
        }

        // Log a record for admin (no balance change, just audit trail)
        const adminTx = {
          uid: user.uid,
          type: "contract",
          label: `Enforced: ${contract.name}`,
          amount: 0,
          counterparty: `Smart Contract · ${contract.name}`,
          hash,
          block,
          note: `Applied to ${students.length} student(s)`,
          ts: firebase.firestore.FieldValue.serverTimestamp()
        };
        const ref = await db.collection("transactions").add(adminTx);
        setTransactions(prev=>[{id:ref.id,...adminTx,ts:new Date()},...prev]);

        setResults(r=>({...r,[contract.id]:`✓ Contract enforced on ${students.length} student(s) · Block #${block} · Hash: ${hash}`}));
      } catch(e) {
        setResults(r=>({...r,[contract.id]:`❌ Failed: ${e.message}`}));
      }
    } else {
      // Contracts with no amount just log
      setResults(r=>({...r,[contract.id]:`✓ Contract executed · Block #${genBlockNum()} · Hash: ${genHash()}`}));
    }

    setExecuting(e=>({...e,[contract.id]:false}));
  }

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">Smart Contracts</div>
        <div className="page-sub">Automated payment logic running on CampusCoin · No manual intervention needed</div>
      </div>

      <div className="notice">📜 Smart contracts automate payments, enforce policies, and execute disbursements trustlessly. All execution is recorded immutably on-chain.</div>

      {SMART_CONTRACTS.map(c => (
        <div key={c.id} className="contract-card">
          <div className="contract-header">
            <div>
              <div className="contract-name">{c.name}</div>
              <div style={{display:"flex",alignItems:"center",gap:".5rem",marginTop:"4px"}}>
                <span className="contract-status">
                  <span className={`status-dot ${c.active?"active":"pending"}`}/>
                  {c.active?"Active":"Inactive"}
                </span>
              </div>
            </div>
            <span className="contract-type">{c.type}</span>
          </div>
          <div className="contract-desc">{c.description}</div>
          <div className="contract-params">
            {c.params.map(p=><span key={p} className="param-chip">{p}</span>)}
          </div>
          {results[c.id] && (
            <div style={{fontSize:".7rem",color:"var(--accent-t)",fontFamily:"monospace",marginBottom:".75rem",padding:".4rem .7rem",background:"var(--accent-d)",borderRadius:"6px",border:"1px solid var(--accent-b)"}}>
              {results[c.id]}
            </div>
          )}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontSize:".68rem",fontFamily:"monospace",color:"var(--muted2)"}}>Contract ID: {c.id}</div>
            {profile.role==="admin" && c.active && (
              <button className="contract-trigger" onClick={()=>executeContract(c)} disabled={!!executing[c.id]}>
                {executing[c.id]?"Executing on-chain…":"▶ Execute Contract"}
              </button>
            )}
            {profile.role==="student" && <span style={{fontSize:".7rem",color:"var(--muted)"}}>View only</span>}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── ADMIN PANEL ──────────────────────────────────────
function AdminPage({ user, profile }) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [mintTo, setMintTo] = useState("");
  const [mintAmt, setMintAmt] = useState("");
  const [mintMsg, setMintMsg] = useState("");
  const [busyMint, setBusyMint] = useState(false);
  const [policyName, setPolicyName] = useState("");
  const [policyVal, setPolicyVal] = useState("");

  useEffect(() => {
    db.collection("users").onSnapshot(snap => {
      setUsers(snap.docs.map(d=>({id:d.id,...d.data()})));
      setLoading(false);
    });
  },[]);

  async function mintTokens() {
    const amt = Number(mintAmt);
    if (!amt || !mintTo.trim()) return setMintMsg("Fill all fields");
    setBusyMint(true);
    // find user by studentId or email
    const match = users.find(u=>u.studentId===mintTo||u.email===mintTo);
    if (!match) { setMintMsg("User not found"); setBusyMint(false); return; }
    await db.collection("users").doc(match.id).update({ tokenBalance: (match.tokenBalance||0)+amt });
    await db.collection("transactions").add({
      uid: match.id, type:"recv",
      label:"Admin Token Mint",
      amount:amt, counterparty:`Admin · ${profile.name}`,
      hash:genHash(), block:genBlockNum(),
      note:"Minted by administrator",
      ts:firebase.firestore.FieldValue.serverTimestamp()
    });
    setMintMsg(`✓ Minted ${amt} ${CAMPUS_TOKEN} to ${match.name}`);
    setMintTo(""); setMintAmt(""); setBusyMint(false);
  }

  async function toggleStatus(u) {
    const newStatus = u.status==="active"?"suspended":"active";
    await db.collection("users").doc(u.id).update({status:newStatus});
  }

  if (profile.role !== "admin") {
    return <div className="page"><div className="empty-state"><div className="empty-icon">🔒</div>Admin access only</div></div>;
  }

  const totalTokens = users.reduce((s,u)=>s+(u.tokenBalance||0),0);

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">Admin Panel</div>
        <div className="page-sub">User management · Token minting · Transaction policies</div>
      </div>

      <div className="stats-grid">
        <div className="stat-card"><div className="stat-label">Total Users</div><div className="stat-value blue-t">{users.length}</div></div>
        <div className="stat-card"><div className="stat-label">Students</div><div className="stat-value green-t">{users.filter(u=>u.role==="student").length}</div></div>
        <div className="stat-card"><div className="stat-label">Tokens in Circulation</div><div className="stat-value token-t">{totalTokens.toLocaleString()}</div><div className="stat-sub" style={{color:"var(--muted)"}}>{CAMPUS_TOKEN}</div></div>
        <div className="stat-card"><div className="stat-label">Active Contracts</div><div className="stat-value purple-t">{SMART_CONTRACTS.filter(c=>c.active).length}</div></div>
      </div>

      {/* Mint tokens */}
      <div className="card">
        <div className="card-header"><div className="card-title">🪙 Mint / Disburse Tokens</div></div>
        <div className="transfer-sub" style={{fontSize:".78rem",color:"var(--muted)",marginBottom:"1rem"}}>Issue tokens to students (scholarships, grants, bursaries). All minting is recorded on-chain.</div>
        {mintMsg && <div className={`notice ${mintMsg.startsWith("✓")?"success":"warn"}`}>{mintMsg}</div>}

                  <th>Balance</th><th>Status</th><th>Actions</th>

                  <tr key={u.id}>

                      <div style={{fontSize:".65rem",color:"var(--muted)",fontFamily:"monospace"}}>{u.studentId||u.email?.split("@")[0]}</div>

  );
}

// ── ANALYTICS ────────────────────────────────────────
function AnalyticsPage({ profile, transactions }) {
  const [view, setView]         = useState("weekly");
  const [aiInsights, setAiInsights] = useState(null);
  const [aiLoading, setAiLoading]   = useState(false);
  const [aiError,   setAiError]     = useState("");
  const apiKey = "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";
  const now = new Date();

  // ── Build bar chart data ──
  const days = view==="weekly"?7:30;
  const barData = [];
  for (let i=days-1;i>=0;i--) {
    const d = new Date(now); d.setDate(now.getDate()-i);
    const label = d.toLocaleDateString("en-IN",{day:"numeric",month:"short"});
    const spent = transactions.filter(t=>{
      const td = t.ts?.toDate?t.ts.toDate():new Date(t.ts||Date.now());
      return td.toDateString()===d.toDateString() && (t.type==="send"||t.type==="fee"||t.type==="event");
    }).reduce((s,t)=>s+t.amount,0);
    barData.push({label,spent});
  }

  // ── Category data ──
  const purposeMap = {};
  transactions.filter(t=>t.type==="send"||t.type==="fee"||t.type==="event").forEach(t=>{
    const cat = t.label||t.type||"Other";
    purposeMap[cat]=(purposeMap[cat]||0)+t.amount;
  });
  const pieData = Object.entries(purposeMap).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
  const totalSpent = pieData.reduce((s,d)=>s+d.value,0);

  // ── Quick computed stats ──
  const totalRecv   = transactions.filter(t=>t.type==="recv").reduce((s,t)=>s+t.amount,0);
  const txCount     = transactions.length;
  const topCategory = pieData[0]?.name || "—";
  const topCatAmt   = pieData[0]?.value || 0;
  const avgPerDay   = txCount>0 ? Math.round(totalSpent/Math.max(1,days)) : 0;
  const lastWeekSpent = transactions.filter(t=>{
    const td=t.ts?.toDate?t.ts.toDate():new Date(t.ts||0);
    return (now-td)<7*86400000 && (t.type==="send"||t.type==="fee"||t.type==="event");
  }).reduce((s,t)=>s+t.amount,0);

  // ── Fetch AI insights from Claude API ──
  async function fetchAIInsights() {
    setAiLoading(true); setAiError(""); setAiInsights(null);
    const txLines = transactions
      .filter(t=>t.type==="send"||t.type==="fee"||t.type==="recv"||t.type==="event")
      .slice(0,40)
      .map(t=>{
        const dir  = t.type==="recv"?"RECEIVED":"SENT";
        const when = t.ts?.toDate?t.ts.toDate().toLocaleDateString("en-IN"):"recently";
        const to   = t.counterparty?` ${t.type==="recv"?"from":"to"} "${t.counterparty}"`:"";
        const cat  = t.label?` [${t.label}]`:"";
        const nt   = t.note?` — note: "${t.note}"`:"";
        return `• ${dir} ${t.amount} CCT${to}${cat}${nt} on ${when}`;
      }).join("\n");
    const summary = pieData.map(d=>`${d.name}: ${d.value} CCT`).join(", ")||"No spending yet";
    const prompt = `You are a smart campus financial AI. Analyse the real transaction history and give personalised insights.
Student: ${profile.name||"Student"} | Balance: ${profile.tokenBalance||0} CCT | Spent: ${totalSpent} CCT | Received: ${totalRecv} CCT
Spending by category: ${summary}
Transaction log:
${txLines||"No transactions yet"}
IMPORTANT: If money was SENT to a person's name, call it a Peer Transfer — not a canteen or service payment, even if the label says Canteen. Be specific and reference real names/amounts.
Respond ONLY with valid JSON, no markdown:
{
  "insights":[
    {"icon":"emoji","label":"short label","value":"specific insight","color":"green|amber|blue|red|purple"},
    {"icon":"emoji","label":"short label","value":"specific insight","color":"green|amber|blue|red|purple"},
    {"icon":"emoji","label":"short label","value":"specific insight","color":"green|amber|blue|red|purple"},
    {"icon":"emoji","label":"short label","value":"specific insight","color":"green|amber|blue|red|purple"}
  ],
  "tip":"One actionable suggestion based on actual spending.",
  "summary":"One sentence financial health summary."
}`;

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "Authorization": "Bearer " + apiKey
        },
        body:JSON.stringify({
          model:"llama-3.3-70b-versatile",
          max_tokens:600,
          messages:[{role:"user",content:prompt}]
        })
      });
      if (!res.ok) {
        const errData = await res.json().catch(()=>({}));
        if (res.status === 401) throw new Error("API key missing or invalid. Add your Anthropic API key to enable AI insights.");
        throw new Error(errData.error?.message || "API error " + res.status);
      }
      const data = await res.json();
      const text = data.choices?.[0]?.message?.content || "";
      const cleaned = text.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(cleaned);
      setAiInsights(parsed);
    } catch(e) {
      setAiError("Could not generate AI insights. If you're running this locally, add your Anthropic API key. Error: " + e.message);
    }
    setAiLoading(false);
  }

  // Auto-fetch when page loads with data
  useEffect(() => {
    if (transactions.length > 0 && !aiInsights && !aiLoading) {
      fetchAIInsights();
    }
  }, [transactions.length]);

  const colorMap = {green:"c-green",amber:"c-amber",blue:"c-blue",red:"c-red",purple:"c-purple"};

  return (
    <div className="page">
      <div className="page-header">
        <div style={{display:"flex",alignItems:"center",gap:".75rem",marginBottom:".2rem",flexWrap:"wrap"}}>
          <div className="page-title" style={{margin:0}}>Analytics</div>
          <span className="ai-badge">✦ AI-POWERED</span>
        </div>
        <div className="page-sub">Smart spending insights · On-chain pattern analysis</div>
      </div>

      {/* ── STAT STRIP ── */}
      <div className="stats-grid" style={{marginBottom:"1.25rem"}}>
        <div className="stat-card">
          <div className="stat-label">Total Spent</div>
          <div className="stat-value red-t">{totalSpent.toLocaleString()}</div>
          <div className="stat-sub" style={{color:"var(--muted)"}}>{CAMPUS_TOKEN} outflow</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Total Received</div>
          <div className="stat-value green-t">{totalRecv.toLocaleString()}</div>
          <div className="stat-sub" style={{color:"var(--muted)"}}>{CAMPUS_TOKEN} inflow</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">This Week</div>
          <div className="stat-value amber-t">{lastWeekSpent.toLocaleString()}</div>
          <div className="stat-sub" style={{color:"var(--muted)"}}>{CAMPUS_TOKEN} spent</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Avg / Day</div>
          <div className="stat-value blue-t">{avgPerDay.toLocaleString()}</div>
          <div className="stat-sub" style={{color:"var(--muted)"}}>{CAMPUS_TOKEN}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Top Category</div>
          <div className="stat-value" style={{fontSize:"1rem"}}>{topCategory}</div>
          <div className="stat-sub" style={{color:"var(--muted)"}}>{topCatAmt} {CAMPUS_TOKEN}</div>
        </div>
      </div>

      {/* ── AI INSIGHTS SECTION ── */}
      <div className="card" style={{marginBottom:".9rem"}}>
        <div className="card-header">
          <div className="card-title">✦ AI Spending Insights</div>
          <button className="btn-refresh-ai" onClick={fetchAIInsights} disabled={aiLoading}>
            {aiLoading ? <><span>⟳</span> Analysing…</> : <><span>⟳</span> Refresh</>}
          </button>
        </div>

        {aiLoading && (
          <div className="ai-generating">
            <div className="ai-dots">
              <div className="ai-dot"/><div className="ai-dot"/><div className="ai-dot"/>
            </div>
            <span>Analysing your spending patterns with AI…</span>
          </div>
        )}

        {aiError && (
          <div className="notice warn">{aiError}</div>
        )}

        {!aiInsights && !aiLoading && transactions.length===0 && (
          <div className="empty-state"><div className="empty-icon">🤖</div>Make a few transactions first — AI will analyse your patterns</div>
        )}

        {aiInsights && (
          <>
            {/* Summary line */}
            {aiInsights.summary && (
              <div style={{fontSize:".82rem",color:"var(--muted)",marginBottom:"1rem",padding:".65rem .9rem",background:"var(--surface2)",borderRadius:"8px",border:"1px solid var(--border)",lineHeight:1.6}}>
                📊 {aiInsights.summary}
              </div>
            )}

            {/* Insight cards */}
            <div className="ai-insight-row" style={{marginBottom:"1rem"}}>
              {aiInsights.insights?.map((ins,i)=>(
                <div key={i} className={`ai-card ${colorMap[ins.color]||"c-green"}`}>
                  <div className="ai-card-icon">{ins.icon}</div>
                  <div className="ai-card-lbl">{ins.label}</div>
                  <div className="ai-card-val">{ins.value}</div>
                </div>
              ))}
            </div>

            {/* Tip */}
            {aiInsights.tip && (
              <div className="ai-tip-box">
                <div className="ai-tip-icon">💡</div>
                <div className="ai-tip-text"><strong>AI Tip:</strong> {aiInsights.tip}</div>
              </div>
            )}
          </>
        )}
      </div>

      {/* ── CHARTS ── */}
      <div style={{display:"flex",gap:".5rem",marginBottom:"1rem"}}>
        {["weekly","monthly"].map(v=>(
          <button key={v} onClick={()=>setView(v)}
            style={{padding:".38rem .85rem",borderRadius:"7px",border:"1px solid",fontSize:".78rem",fontWeight:500,transition:"all .15s",
              borderColor:view===v?"var(--accent-b)":"var(--border)",

              color:view===v?"var(--accent-t)":"var(--muted)"}}>
            {v==="weekly"?"This Week":"This Month"}
          </button>
        ))}
      </div>

      <div className="chart-grid">
        <div className="chart-card">
          <div className="chart-title">Token Outflow ({view})</div>
          {barData.every(d=>d.spent===0)
            ? <div className="empty-state" style={{padding:"2rem 0"}}>No spending data yet</div>
            : <ResponsiveContainer width="100%" height={200}>

        <div className="chart-card">
          <div className="chart-title">By Transaction Type</div>
          {pieData.length===0

      {/* ── LEDGER ── */}

        }
      </div>
    </div>
  );

// ── MAIN APP ─────────────────────────────────────────
function App() {
  const [authUser,  setAuthUser]  = useState(undefined);
  const [profile,   setProfile]   = useState(null);
  const [transactions, setTransactions] = useState([]);
  const [page, setPage] = useState("dashboard");

  useEffect(()=>{
    return auth.onAuthStateChanged(async user=>{
      setAuthUser(user);
      if (user) {
        try {
          const snap = await db.collection("users").doc(user.uid).get();
          if (snap.exists) {
            setProfile(snap.data());
          } else {
            // No profile found - sign out to avoid stuck loading
            await auth.signOut();
            setAuthUser(null);
            setProfile(null);
          }
        } catch(e) {
          console.error("Profile load error:", e);
          await auth.signOut();
          setAuthUser(null);
          setProfile(null);
        }
      } else {
        setProfile(null);
      }
    });
  },[]);

  useEffect(()=>{
    if (!authUser) return;
    return db.collection("transactions")
      .where("uid","==",authUser.uid).limit(50)
      .onSnapshot(snap=>{
        const docs = snap.docs.map(d=>({id:d.id,...d.data()}));
        docs.sort((a,b)=>{
          const ta=a.ts?.toDate?a.ts.toDate():new Date(a.ts||0);
          const tb=b.ts?.toDate?b.ts.toDate():new Date(b.ts||0);
          return tb-ta;
        });
        setTransactions(docs);
      });
  },[authUser]);

  if (authUser===undefined) return <div className="auth-wrap" style={{color:"var(--muted)"}}>Loading…</div>;
  if (!authUser) return <AuthScreen onAuth={()=>{}} />;
  if (!profile)  return <div className="auth-wrap" style={{color:"var(--muted)"}}>Loading wallet…</div>;

  const isAdmin = profile.role==="admin";
  const initials = (profile.name||"U").split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();

  const navItems = [
    { id:"dashboard", label:"Dashboard",   icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> },
    { id:"wallet",    label:"Wallet",       icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><circle cx="16" cy="14" r="1" fill="currentColor"/></svg> },
    { id:"events",    label:"Events",       icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> },
    { id:"contracts", label:"Contracts",    icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg> },
    { id:"analytics", label:"Analytics",    icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> },
    ...(isAdmin ? [{ id:"admin", label:"Admin",  icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> }] : []),
  ];

      case "wallet":     return <WalletPage {...props}/>;
      case "events":     return <EventsPage {...props}/>;
      case "contracts":  return <ContractsPage {...props}/>;
      case "analytics":  return <AnalyticsPage {...props}/>;

                <path d="M6 5V7M6 5L8 4M6 5L4 4" stroke="white" strokeWidth="1.2" strokeLinecap="round"/>
              </svg>
            </div>
            CampusCoin
          </div>
        </div>

        {/* Token balance strip */}
        <div className="token-bar">
          <div className="token-icon">🪙</div>
          <div>
            <div className="token-label">{CAMPUS_TOKEN} Balance</div>
            <div className="token-val">{(profile.tokenBalance||0).toLocaleString()}</div>
          </div>
        </div>

        <nav className="sidebar-nav">
          <div className="nav-section-label">Overview</div>
          {navItems.slice(0,2).map(n=>(

          ))}
          <div className="nav-section-label">Campus</div>
          {navItems.slice(2,4).map(n=>(
            <button key={n.id} className={`nav-item ${page===n.id?"active":""}`} onClick={()=>setPage(n.id)}>
              {n.icon}{n.label}
            </button>
          ))}
          <div className="nav-section-label">Insights</div>
          {navItems.slice(4).map(n=>(
            <button key={n.id} className={`nav-item ${page===n.id?"active":""}`} onClick={()=>setPage(n.id)}>
              {n.icon}{n.label}
            </button>
          ))}
        </nav>

        <div className="sidebar-bottom">
          <div className="user-row">
            <div className="user-av">{initials}</div>
            <div style={{flex:1,minWidth:0}}>
              <div className="user-name">{profile.name}</div>
              <span className={`user-role-tag role-tag ${roleColor(profile.role)}`}>{profile.role}</span>
            </div>
          </div>
          <button className="btn-logout" onClick={()=>auth.signOut()}>Sign out</button>
        </div>
      </aside>

      <main className="main-content">{renderPage()}</main>

      <nav className="mobile-nav">
        <div className="mobile-nav-inner">
          {navItems.map(n=>(
            <button key={n.id} className={`mobile-nav-item ${page===n.id?"active":""}`} onClick={()=>setPage(n.id)}>
              {n.icon}{n.label}
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
